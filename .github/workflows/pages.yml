name: Deploy forecast site to Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore forecast API cache
        uses: actions/cache@v6
        with:
          path: .cache/forecast_bundle.json
          key: forecast-api-cache-${{ github.run_id }}
          restore-keys: |
            forecast-api-cache-

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Check BigQuery data quality
        env:
          FORECAST_DATA_BACKEND: bigquery
          GCP_PROJECT_ID: hachijo-flight-forecast
          BIGQUERY_DATASET: flight_forecast
          BIGQUERY_TABLE: flight_weather_logs
          BIGQUERY_LOCATION: asia-northeast1
        run: python data_quality.py --backend bigquery --format markdown --output data_quality_report.md --fail-on none

      - name: Add data quality report to summary
        if: always()
        run: |
          if [ -f data_quality_report.md ]; then
            cat data_quality_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Data quality report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload data quality report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pages-data-quality-report
          path: data_quality_report.md
          if-no-files-found: ignore

      - name: Build static forecast
        env:
          FORECAST_DATA_BACKEND: bigquery
          GCP_PROJECT_ID: hachijo-flight-forecast
          BIGQUERY_DATASET: flight_forecast
          BIGQUERY_TABLE: flight_weather_logs
          BIGQUERY_LOCATION: asia-northeast1
        run: python build_static.py

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

