name: Daily Flight & Weather Data Collection

on:
  schedule:
    # 毎日日本時間 21:00 (UTC 12:00) に自動実行
    # 最終便の運航ステータス確定後にデータを回収します
    - cron: '0 12 * * *'
  workflow_dispatch:
    # GitHubのWeb画面から手動でいつでも即時起動できるボタンを有効化
    # 動作確認や過去データの手動回収時に便利です

jobs:
  collect-data:
    runs-on: ubuntu-latest
    
    # リポジトリへの自動プッシュを許可するための権限設定
    permissions:
      contents: read
      id-token: write

    steps:
      # 1. リポジトリのコードを取得
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # 最新の変更を反映してプッシュするために履歴を全取得
          fetch-depth: 0

      # 2. Python環境のセットアップ
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip' # pipのキャッシュを有効化して高速化

      # 3. 依存ライブラリのインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      # 5. データ収集スクリプトの実行
      # GitHub Secrets に登録した ODPT_API_KEY を環境変数に渡します
      - name: Run data collector
        env:
          ODPT_API_KEY: ${{ secrets.ODPT_API_KEY }}
          FORECAST_DATA_BACKEND: bigquery
          GCP_PROJECT_ID: hachijo-flight-forecast
          BIGQUERY_DATASET: flight_forecast
          BIGQUERY_TABLE: flight_weather_logs
          BIGQUERY_LOCATION: asia-northeast1
        run: |
          python data_collector.py

      - name: Check BigQuery data quality
        if: always()
        env:
          FORECAST_DATA_BACKEND: bigquery
          GCP_PROJECT_ID: hachijo-flight-forecast
          BIGQUERY_DATASET: flight_forecast
          BIGQUERY_TABLE: flight_weather_logs
          BIGQUERY_LOCATION: asia-northeast1
        run: python data_quality.py --backend bigquery --format markdown --output data_quality_report.md --fail-on none

      - name: Add data quality report to summary
        if: always()
        run: |
          if [ -f data_quality_report.md ]; then
            cat data_quality_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Data quality report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload data quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collection-data-quality-report
          path: data_quality_report.md
          if-no-files-found: ignore

