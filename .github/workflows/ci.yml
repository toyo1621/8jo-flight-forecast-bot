name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Restore local SQLite snapshot
        run: python db_snapshot.py restore

      - name: Run local data quality smoke check
        run: python data_quality.py --backend sqlite --format markdown --output data_quality_report.md --fail-on none

      - name: Add data quality report to summary
        if: always()
        run: |
          if [ -f data_quality_report.md ]; then
            cat data_quality_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Data quality report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload data quality report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: data-quality-report
          path: data_quality_report.md
          if-no-files-found: ignore
